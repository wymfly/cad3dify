name: general_loft_transition
display_name: 渐变截面过渡件
part_type: general
description: 圆形到矩形的渐变截面过渡件（loft）

params:
  - name: circle_diameter
    display_name: 圆形端直径
    unit: mm
    param_type: float
    range_min: 5
    range_max: 500
    default: 50
  - name: rect_width
    display_name: 矩形端宽度
    unit: mm
    param_type: float
    range_min: 5
    range_max: 500
    default: 60
  - name: rect_height
    display_name: 矩形端高度
    unit: mm
    param_type: float
    range_min: 5
    range_max: 500
    default: 40
  - name: length
    display_name: 过渡长度
    unit: mm
    param_type: float
    range_min: 10
    range_max: 1000
    default: 80
  - name: wall_thickness
    display_name: 壁厚
    unit: mm
    param_type: float
    range_min: 0
    range_max: 50
    default: 0

constraints:
  - "length > 0"
  - "wall_thickness < circle_diameter / 2 or wall_thickness == 0"

code_template: |
  import cadquery as cq

  cd = {{ circle_diameter }}
  rw = {{ rect_width }}
  rh = {{ rect_height }}
  ln = {{ length }}
  wt = {{ wall_thickness }}

  # Loft 过渡：底部圆形 → 顶部矩形
  result = cq.Workplane("XY").circle(cd / 2).workplane(offset=ln).rect(rw, rh).loft()

  {% if wall_thickness > 0 %}
  # 镂空（壁厚）
  result = result.shell(-wt)
  {% endif %}

  cq.exporters.export(result, "{{ output_filename }}")
