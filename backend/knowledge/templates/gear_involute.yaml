name: gear_involute
display_name: 参数化直齿轮
part_type: gear
description: 参数化直齿轮（矩形槽近似齿廓），支持模数/齿数/压力角/齿宽/轴孔

params:
  - name: module_val
    display_name: 模数
    unit: mm
    param_type: float
    range_min: 0.5
    range_max: 10
    default: 2
  - name: num_teeth
    display_name: 齿数
    unit: ""
    param_type: int
    range_min: 10
    range_max: 200
    default: 24
  - name: pressure_angle
    display_name: 压力角
    unit: deg
    param_type: float
    range_min: 14.5
    range_max: 25
    default: 20
  - name: face_width
    display_name: 齿宽
    unit: mm
    param_type: float
    range_min: 2
    range_max: 200
    default: 20
  - name: bore_diameter
    display_name: 轴孔直径
    unit: mm
    param_type: float
    range_min: 0
    range_max: 500
    default: 16

constraints:
  - "num_teeth >= 10"
  - "bore_diameter < module_val * num_teeth"
  - "face_width > 0"
  - "pressure_angle >= 14.5 and pressure_angle <= 25"

code_template: |
  import cadquery as cq
  import math

  # 参数
  m = {{ module_val }}       # 模数
  z = {{ num_teeth }}        # 齿数
  alpha = math.radians({{ pressure_angle }})  # 压力角
  b = {{ face_width }}       # 齿宽
  bore = {{ bore_diameter }} # 轴孔直径

  # 基本圆参数
  rp = m * z / 2             # 分度圆半径
  ra = m * (z + 2) / 2       # 齿顶圆半径
  rf = m * (z - 2.5) / 2     # 齿根圆半径
  rb = rp * math.cos(alpha)  # 基圆半径

  # 齿槽角度
  tooth_angle = 360.0 / z

  # 以齿顶圆为基体
  result = cq.Workplane("XY").circle(ra).extrude(b)

  # 切除齿槽（矩形近似）
  slot_width = m * math.pi / 2  # 齿槽宽 ≈ 半个齿距
  for i in range(z):
      angle = i * tooth_angle
      result = (
          result.faces(">Z").workplane()
          .transformed(rotate=(0, 0, angle))
          .center(rp, 0)
          .rect(m * 1.25, slot_width)
          .cutBlind(-(b + 1))
      )

  {% if bore_diameter > 0 %}
  # 轴孔
  result = result.faces(">Z").workplane().circle(bore / 2).cutThruAll()
  {% endif %}

  cq.exporters.export(result, "{{ output_filename }}")
